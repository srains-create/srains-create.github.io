<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

  <title>Sign Up Page</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="container mt-5 mb-5">
    <h1 class="text-center mb-4" style="font-family: 'Baloo 2', cursive;">Sign Up Form</h1>

    <form id="signupForm" action="welcome.html">

      <div class="mb-3">
        <label for="fName" class="form-label">First Name</label>
        <input type="text" id="fName" name="fName" class="form-control">
      </div>

      <div class="mb-3">
        <label for="lName" class="form-label">Last Name</label>
        <input type="text" id="lName" name="lName" class="form-control">
      </div>

      <div class="mb-3">
        <p class="mb-2">Gender</p>

        <input type="radio" id="male" name="gender" value="m">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="f" class="ms-3">
        <label for="female">Female</label>
      </div>

      <div class="mb-3">
        <label for="zip" class="form-label">Zip Code</label>
        <input type="text" id="zip" name="zip" class="form-control">

        <div class="mt-2">
          City: <span id="city"></span>
        </div>

        <div>
          Latitude: <span id="latitude"></span>
        </div>

        <div>
          Longitude: <span id="longitude"></span>
        </div>
      </div>

      <div class="mb-3">
        <label for="state" class="form-label">State</label>

        <select id="state" name="state" class="form-select">
          <option value="">Loading states...</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="county" class="form-label">County</label>

        <select id="county" name="county" class="form-select">
          <option value="">Select a state first</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="username" class="form-label">Desired Username</label>
        <input type="text" id="username" name="username" class="form-control">

        <span id="usernameError"></span>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control">

        <span id="suggestedPassword"></span>
      </div>

      <div class="mb-3">
        <label for="passwordAgain" class="form-label">Retype Password</label>
        <input
          type="password"
          id="passwordAgain"
          name="passwordAgain"
          class="form-control"
        >

        <span id="passwordError"></span>
      </div>

      <button type="submit" class="btn btn-primary">
        Sign Up
      </button>

    </form>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
